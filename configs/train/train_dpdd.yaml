model:
  cldm:
    target: model.cldm_defocus.ControlLDMDefocus
    params:
      latent_scale_factor: 0.18215
      kernel_size: 5
      alpha_init: 2.0
      max_radius: 3.0
      gate_hidden_dim: 16
      gate_tv_lambda: 0.01
      unet_cfg:
        use_checkpoint: True
        image_size: 32
        in_channels: 4
        out_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False
      vae_cfg:
        embed_dim: 4
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
      clip_cfg:
        embed_dim: 1024
        vision_cfg:
          image_size: 224
          layers: 32
          width: 1280
          head_width: 80
          patch_size: 14
        text_cfg:
          context_length: 77
          vocab_size: 49408
          width: 1024
          heads: 16
          layers: 24
        layer: "penultimate"
      controlnet_cfg:
        use_checkpoint: True
        image_size: 32
        in_channels: 4
        hint_channels: 8
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False

  diffusion:
    target: model.gaussian_diffusion.Diffusion
    params:
      linear_start: 0.00085
      linear_end: 0.0120
      timesteps: 1000

dataset:
  train:
    target: dataset.dpdd.DPDDDataset
    params:
      dataset_root: /raid/danielchen/defous-deblur/dd_dp_dataset_png
      split: train
      out_size: 512
      crop_type: random
      depth_subdir: depth_map_depthpro
      defocus_subdir: null
      prompt_prob: 0.5
  val:
    target: dataset.dpdd.DPDDDataset
    params:
      dataset_root: /raid/danielchen/defous-deblur/dd_dp_dataset_png
      split: val
      out_size: 512
      crop_type: random
      depth_subdir: depth_map_depthpro
      defocus_subdir: null
      prompt_prob: 0.5
  test:
    target: dataset.dpdd.DPDDDataset
    params:
      dataset_root: /raid/danielchen/defous-deblur/dd_dp_dataset_png
      split: test
      out_size: 512
      crop_type: center
      depth_subdir: depth_map_depthpro
      defocus_subdir: null
      prompt_prob: 0.0

train:
  sd_path: checkpoints/v2-1_768-ema-pruned.safetensors
  resume: null
  resume_kpn: null
  exp_dir: exp_dpdd_defocus
  learning_rate: 1e-5
  eta_min: 1e-7
  T_max: 50000
  batch_size: 2
  num_workers: 8
  train_steps: 200000
  log_every: 50
  ckpt_every: 4000
  image_every: 1000
